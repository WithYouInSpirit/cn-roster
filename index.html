<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestial Networks - Staff Roster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');

html, body { margin: 0; padding: 0; background: #0d0d12; }
* { box-sizing: border-box; margin: 0; padding: 0; }

.cnr-wrap {
  --gold: #b06aff;
  --dark: #0d0d12;
  --surface: #13131c;
  --surface2: #1a1a28;
  --border: rgba(255,255,255,0.07);
  --text: #e8e4f0;
  --muted: #8a85a0;
  font-family: 'Inter','Segoe UI',system-ui,sans-serif;
  font-size: 14px; line-height: 1.6;
  color: var(--text);
  background: transparent;
  width: 100%; padding: 1.5rem;
  min-height: 100vh;
}

.cnr-inner {
  max-width: 1100px; margin: 0 auto;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 2rem 2rem 4rem;
}

/* Header */
.cnr-header {
  text-align: center;
  padding: 2rem 0 1.75rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 1.5rem;
}
.cnr-logo { width: 80px; height: 80px; margin: 0 auto 1.25rem; display: block; }
.cnr-header h1 {
  font-family: 'Rajdhani','Trebuchet MS',sans-serif;
  font-size: 2rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #fff;
}
.cnr-header h1 span { color: var(--gold); }
.cnr-subtitle { font-size: 12px; color: var(--muted); margin-top: 0.5rem; letter-spacing: 0.06em; text-transform: uppercase; }
.cnr-updated  { font-size: 11px; color: var(--muted); margin-top: 0.4rem; }

/* Nav tabs */
.cnr-nav {
  display: flex; gap: 6px;
  margin-bottom: 2rem;
  background: var(--surface2);
  padding: 5px; border-radius: 10px;
  border: 1px solid var(--border);
}
.cnr-btn {
  flex: 1; padding: 10px 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  font-family: 'Rajdhani','Trebuchet MS',sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; border-radius: 7px;
  transition: all 0.2s;
}
.cnr-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.cnr-btn.cnr-active { background: var(--surface); color: #fff; border-color: var(--border); }
.cnr-btn.cnr-cw.cnr-active  { color: #7eb8f7; border-color: rgba(126,184,247,0.3); }
.cnr-btn.cnr-imp.cnr-active { color: #f77e7e; border-color: rgba(247,126,126,0.3); }
.cnr-btn.cnr-dev.cnr-active { color: #e06030; border-color: rgba(180,60,20,0.4); }

/* Sections */
.cnr-section { display: none; }
.cnr-section.cnr-active { display: block; }

/* Tier headers */
.cnr-tier-header {
  display: flex; align-items: stretch; gap: 16px;
  margin: 2rem 0 1.25rem;
  padding: 14px 18px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  position: relative; overflow: hidden;
}
.cnr-tier-header::after {
  content: '';
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 52px; height: 52px;
  background: url('https://media.invisioncic.com/a334757/set_resources_3/logo_white_main.png?_cb=1777194171') center/contain no-repeat;
  opacity: 0.07; pointer-events: none;
}
.cnr-th-pip { width: 5px; align-self: stretch; border-radius: 3px; flex-shrink: 0; }
.cnr-pip-exec   { background: linear-gradient(180deg,#b06aff,#6020c0); }
.cnr-pip-dir    { background: linear-gradient(180deg,#f0821e,#b05010); }
.cnr-pip-mgmt   { background: linear-gradient(180deg,#b84050,#701020); }
.cnr-pip-head   { background: linear-gradient(180deg,#e06030,#b03010); }
.cnr-pip-senior { background: linear-gradient(180deg,#d4b800,#a08800); }
.cnr-pip-ops    { background: linear-gradient(180deg,#5b8fd9,#2960b0); }
.cnr-pip-light  { background: linear-gradient(180deg,#7eb8f7,#4080c0); }
.cnr-pip-tan    { background: linear-gradient(180deg,#c8a870,#906030); }
.cnr-pip-dev    { background: linear-gradient(180deg,#e06030,#b03010); }

.cnr-tier-header h2 {
  font-family: 'Rajdhani','Trebuchet MS',sans-serif;
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #fff; line-height: 1.1;
}
.cnr-tier-header p { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* Grid */
.cnr-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px,1fr));
  gap: 10px; margin-bottom: 0.5rem;
}

/* Cards */
.cnr-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
}
.cnr-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
.cnr-card.cnr-vacant { opacity: 0.4; }

.cnr-card-top {
  padding: 12px 14px 10px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.cnr-exec-top   { background: rgba(100,30,180,0.08); }
.cnr-dir-top    { background: rgba(230,120,30,0.07); }
.cnr-mgmt-top   { background: rgba(100,15,30,0.1); }
.cnr-head-top   { background: rgba(180,60,20,0.08); }
.cnr-senior-top { background: rgba(200,170,20,0.07); }
.cnr-ops-top    { background: rgba(41,98,185,0.07); }
.cnr-light-top  { background: rgba(100,160,230,0.06); }
.cnr-tan-top    { background: rgba(160,130,80,0.06); }
.cnr-dev-top    { background: rgba(180,60,20,0.07); }

/* Rank badge */
.cnr-rank-badge {
  font-family: 'Rajdhani','Trebuchet MS',sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.06em; padding: 3px 8px;
  border-radius: 5px;
}
.cnr-badge-exec   { background: rgba(100,30,180,0.15);  color: #b06aff; border: 1px solid rgba(138,43,226,0.4); }
.cnr-badge-dir    { background: rgba(230,120,30,0.15);  color: #f0821e; border: 1px solid rgba(230,120,30,0.4); }
.cnr-badge-mgmt   { background: rgba(100,15,30,0.2);    color: #b84050; border: 1px solid rgba(140,25,45,0.45); }
.cnr-badge-head   { background: rgba(180,60,20,0.18);   color: #e06030; border: 1px solid rgba(180,60,20,0.4); }
.cnr-badge-senior { background: rgba(200,170,20,0.15);  color: #d4b800; border: 1px solid rgba(200,170,20,0.4); }
.cnr-badge-ops    { background: rgba(41,98,185,0.15);   color: #5b8fd9; border: 1px solid rgba(41,98,185,0.4); }
.cnr-badge-staff  { background: rgba(41,98,185,0.15);   color: #5b8fd9; border: 1px solid rgba(41,98,185,0.4); }
.cnr-badge-light  { background: rgba(100,160,230,0.12); color: #7eb8f7; border: 1px solid rgba(100,160,230,0.35); }
.cnr-badge-tan    { background: rgba(160,130,80,0.15);  color: #c8a870; border: 1px solid rgba(160,130,80,0.4); }
.cnr-badge-dev    { background: rgba(180,60,20,0.18);   color: #e06030; border: 1px solid rgba(180,60,20,0.4); }
.cnr-badge-gfx    { background: rgba(41,98,185,0.15);   color: #5b8fd9; border: 1px solid rgba(41,98,185,0.4); }

/* Avatar */
.cnr-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani','Trebuchet MS',sans-serif;
  font-size: 15px; font-weight: 700; flex-shrink: 0;
}
.cnr-av-exec   { background: rgba(100,30,180,0.2);   color: #b06aff; }
.cnr-av-dir    { background: rgba(230,120,30,0.2);   color: #f0821e; }
.cnr-av-mgmt   { background: rgba(100,15,30,0.25);   color: #b84050; }
.cnr-av-head   { background: rgba(180,60,20,0.22);   color: #e06030; }
.cnr-av-senior { background: rgba(200,170,20,0.2);   color: #d4b800; }
.cnr-av-ops    { background: rgba(41,98,185,0.2);    color: #5b8fd9; }
.cnr-av-staff  { background: rgba(41,98,185,0.2);    color: #5b8fd9; }
.cnr-av-light  { background: rgba(100,160,230,0.15); color: #7eb8f7; }
.cnr-av-tan    { background: rgba(160,130,80,0.2);   color: #c8a870; }
.cnr-av-dev    { background: rgba(180,60,20,0.2);    color: #e06030; }
.cnr-av-gfx    { background: rgba(41,98,185,0.2);    color: #5b8fd9; }
.cnr-av-vacant { background: rgba(255,255,255,0.05); color: var(--muted); }

/* Card body */
.cnr-card-body { padding: 12px 14px 14px; }
.cnr-card-body h3 {
  font-family: 'Rajdhani','Trebuchet MS',sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.05em; color: #fff;
  text-transform: uppercase;
}
.cnr-rank-label { font-size: 11px; color: var(--muted); margin-top: 1px; }
.cnr-role       { font-size: 11px; color: var(--muted); margin-top: 1px; }
.cnr-alias      { font-size: 11px; color: rgba(232,228,240,0.45); margin-top: 3px; font-style: italic; }

.cnr-ratings { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.cnr-rating  { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; display: inline-block; width: fit-content; }
.cnr-vg    { background: rgba(143,207,126,0.12); color: #8fcf7e; }
.cnr-good  { background: rgba(126,184,247,0.12); color: #7eb8f7; }
.cnr-avg   { background: rgba(201,168,76,0.12);  color: #c9a84c; }
.cnr-below { background: rgba(247,126,126,0.12); color: #f77e7e; }

.cnr-meta { margin-top: 8px; }
.cnr-discord { font-size: 10px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 4px; display: inline-block; }
.cnr-discord::before { content: '@ '; opacity: 0.5; }

/* Loading */
.cnr-loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 3rem; color: var(--muted); font-size: 13px; }
.cnr-spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: cnr-spin 0.8s linear infinite; }
@keyframes cnr-spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════════
   PLAYER CARD MODAL
══════════════════════════════════════════ */
.cnr-overlay {
  position: absolute;
  left: 0; right: 0;
  z-index: 9999;
  background: rgba(4,4,10,0.88);
  backdrop-filter: blur(8px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 1.5rem 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s ease;
}
.cnr-overlay.cnr-open { opacity: 1; pointer-events: all; }

.cnr-modal {
  background: #0f0f17;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.1);
  width: 100%; max-width: 460px;
  overflow: hidden;
  transform: translateY(20px) scale(0.95);
  transition: transform 0.28s cubic-bezier(.22,1,.36,1);
  box-shadow: 0 40px 100px rgba(0,0,0,0.85), 0 0 0 1px rgba(255,255,255,0.05);
  font-family: 'Rajdhani','Trebuchet MS',sans-serif !important;
  color: #e8e4f0 !important;
}
.cnr-overlay.cnr-open .cnr-modal { transform: translateY(0) scale(1); }

/* ── Banner ── */
.cnr-pc-banner {
  position: relative; min-height: 110px; overflow: hidden;
}
.cnr-pc-banner-bg {
  position: absolute; inset: 0; pointer-events: none;
}
/* Decorative geometric overlay */
.cnr-pc-banner-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    -55deg,
    transparent 0px, transparent 18px,
    rgba(255,255,255,0.025) 18px, rgba(255,255,255,0.025) 19px
  );
}
.cnr-pc-banner-stripe {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; background: rgba(255,255,255,0.1);
}
.cnr-pc-close {
  position: absolute; top: 13px; right: 13px; z-index: 3;
  width: 30px; height: 30px;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 50%;
  color: rgba(255,255,255,0.7) !important;
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  font-family: inherit;
}
.cnr-pc-close:hover { background: rgba(255,255,255,0.15); color: #fff !important; }

.cnr-pc-head-content {
  position: relative; z-index: 2;
  padding: 22px 20px 20px;
  display: flex; align-items: flex-end; gap: 16px;
}
.cnr-pc-avatar {
  width: 70px; height: 70px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 700; flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.18);
  box-shadow: 0 6px 24px rgba(0,0,0,0.6), 0 0 0 4px rgba(0,0,0,0.3);
  font-family: 'Rajdhani','Trebuchet MS',sans-serif !important;
  letter-spacing: 0;
}
.cnr-pc-identity { flex: 1; min-width: 0; padding-bottom: 2px; }
.cnr-pc-name {
  font-size: 1.6rem; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
  color: #fff !important; line-height: 1.05;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 2px 12px rgba(0,0,0,0.7);
}
.cnr-pc-rank-line {
  display: flex; align-items: center; gap: 7px; margin-top: 7px; flex-wrap: wrap;
}
.cnr-pc-rankname {
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.55) !important;
  letter-spacing: 0.05em; text-transform: uppercase;
}

/* ── Widget grid ── */
.cnr-pc-widgets {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border-top: 1px solid rgba(255,255,255,0.07);
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
/* 2-widget fallback */
.cnr-pc-widgets.cnr-w2 { grid-template-columns: repeat(2, 1fr); }

.cnr-pc-widget {
  display: flex; flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  padding: 13px 14px 12px;
  background: #0f0f17;
  position: relative;
}
.cnr-pc-widget::before {
  content: '';
  position: absolute; top: 0; left: 14px; right: 14px;
  height: 2px; border-radius: 0 0 3px 3px;
  background: currentColor;
  opacity: 0.4;
}
.cnr-pc-widget-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: rgba(255,255,255,0.07);
}
.cnr-pc-widget-text { display: flex; flex-direction: column; gap: 2px; }
.cnr-pc-widget-label {
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.38) !important; line-height: 1;
}
.cnr-pc-widget-val {
  font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.02em; line-height: 1.2;
  color: inherit !important;
}

/* Branch colours */
.cnr-w-exec { color: #c490ff !important; }
.cnr-w-ops  { color: #7eb8f7 !important; }
.cnr-w-dev  { color: #f08050 !important; }
/* Server colours */
.cnr-w-cw   { color: #60d0ff !important; }
.cnr-w-imp  { color: #ff8080 !important; }
/* Access tier colours */
.cnr-w-acc-a { color: #d090ff !important; } /* Full Access — purple */
.cnr-w-acc-b { color: #ffaa55 !important; } /* Elevated — orange */
.cnr-w-acc-c { color: #70b8ff !important; } /* Standard+ / Standard — blue */
.cnr-w-acc-d { color: #a0a0b8 !important; } /* Limited — grey */

/* ── Detail section ── */
.cnr-pc-body { padding: 0 0 4px; display: flex; flex-direction: column; }

.cnr-pc-section-label {
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(138,133,160,0.5) !important;
  padding: 10px 20px 5px;
  margin-top: 0;
}

.cnr-pc-row {
  display: flex; align-items: center;
  padding: 7px 20px; gap: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cnr-pc-row:last-child { border-bottom: none; }
.cnr-pc-row-icon {
  width: 22px; text-align: center; flex-shrink: 0;
  font-size: 13px; opacity: 0.35;
}
.cnr-pc-row-label {
  font-size: 11px; font-weight: 500;
  color: rgba(138,133,160,0.8) !important;
  flex: 0 0 auto; min-width: 85px;
  letter-spacing: 0.02em;
}
.cnr-pc-row-val {
  font-size: 13px; font-weight: 600;
  color: #e0ddf0 !important; flex: 1; text-align: right;
}
.cnr-pc-row-val.italic {
  font-style: italic; color: rgba(232,228,240,0.45) !important; font-weight: 400;
}

/* ── Perf pills ── */
.cnr-pb {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px 3px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.03em;
  border: 1px solid transparent;
}
.cnr-pb::before { content: '●'; font-size: 7px; opacity: 0.7; }
.cnr-pb-vg    { background: rgba(80,180,70,0.12);  border-color: rgba(143,207,126,0.28); color: #8fcf7e !important; }
.cnr-pb-good  { background: rgba(60,130,220,0.12); border-color: rgba(126,184,247,0.28); color: #7eb8f7 !important; }
.cnr-pb-avg   { background: rgba(190,150,20,0.12); border-color: rgba(212,184,0,0.28);   color: #d4b800 !important; }
.cnr-pb-below { background: rgba(200,50,50,0.12);  border-color: rgba(247,126,126,0.28); color: #f77e7e !important; }

/* ── Access badge (used in body rows) ── */
.cnr-access-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.05em;
  border: 1px solid currentColor;
  opacity: 0.9;
}

/* ── Footer ── */
.cnr-pc-footer {
  padding: 12px 16px 16px;
  display: flex; gap: 8px; align-items: center;
  border-top: 1px solid rgba(255,255,255,0.07);
  background: rgba(0,0,0,0.2);
}
.cnr-pc-discord-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(88,101,242,0.1);
  border: 1px solid rgba(88,101,242,0.25);
  border-radius: 9px; padding: 8px 12px;
  font-size: 12px; font-weight: 600;
  color: #8b9dff !important; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: 'Rajdhani','Trebuchet MS',sans-serif !important;
}
.cnr-pc-discord-pill svg { flex-shrink: 0; opacity: 0.8; }
.cnr-pc-forum-btn {
  display: inline-flex; align-items: center; gap: 6px;
  text-decoration: none;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 9px; padding: 8px 14px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,0.55) !important; white-space: nowrap;
  font-family: 'Rajdhani','Trebuchet MS',sans-serif !important;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.cnr-pc-forum-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.25);
  color: #fff !important;
}
.cnr-pc-no-discord {
  font-size: 11px; color: rgba(255,255,255,0.18) !important;
  font-style: italic; flex: 1;
}

/* Mobile */
@media(max-width:768px) {
  .cnr-wrap  { padding: 0.75rem; }
  .cnr-inner { padding: 1.25rem 1rem 3rem; border-radius: 8px; }
  .cnr-nav   { flex-direction: column; gap: 4px; }
  .cnr-grid  { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); }
  .cnr-tier-header h2 { font-size: 1.1rem; }
}
@media(max-width:480px) {
  .cnr-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="cnr-wrap">
<div class="cnr-inner">

  <div class="cnr-header">

    <h1>Celestial <span>Networks</span></h1>

<script>
(function() {
  var BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRwxbNHj9OXK2eSxwXLeFgdMvZo-kQIptcJfd9u2gJR2OowOnGAoKEOZKr9ChPK8ruscfVUv03E5ED1/pub?single=true&output=csv&gid=';
  var SHEETS = { cw: BASE+'1184250700', imp: BASE+'502024218', dev: BASE+'1982304147' };

  // Canonical tier label list — includes singular/plural and common variants
  var TIER_LABELS = [
    'Executive Staff',
    'Executives',
    'Server Management',
    'Management',
    'Senior Staff',
    'Senior Event Masters',
    'Senior Event Master',
    'Admins / Event Masters',
    'Admins/Event Masters',
    'Moderators',
    'Junior Event Masters',
    'Junior Event Master',
    'Developer Management',
    'Development Team',
    'Design & Marketing Team'
  ];

  var TIER_META = {
    'Executive Staff':         { label:'Executive Staff',        pip:'exec'   },
    'Executives':              { label:'Executive Staff',        pip:'exec'   },
    'Server Management':       { label:'Server Management',      pip:'mgmt'   },
    'Management':              { label:'Server Management',      pip:'mgmt'   },
    'Senior Staff':            { label:'Senior Staff',           pip:'senior' },
    'Senior Event Masters':    { label:'Senior Event Masters',   pip:'senior' },
    'Senior Event Master':     { label:'Senior Event Masters',   pip:'senior' },
    'Admins / Event Masters':  { label:'Admins & Event Masters', pip:'ops'    },
    'Admins/Event Masters':    { label:'Admins & Event Masters', pip:'ops'    },
    'Moderators':              { label:'Moderators',             pip:'light'  },
    'Junior Event Masters':    { label:'Junior Event Masters',   pip:'light'  },
    'Junior Event Master':     { label:'Junior Event Masters',   pip:'light'  },
    'Developer Management':    { label:'Development Leadership', pip:'head'   },
    'Development Team':        { label:'Development Team',       pip:'ops'    },
    'Design & Marketing Team': { label:'Design & Marketing',     pip:'ops'    }
  };

  var RANK_BADGE = {
    'Network Executive':      { badge:'EXEC', cls:'badge-exec',   av:'av-exec'   },
    'Network Director':       { badge:'DIR',  cls:'badge-dir',    av:'av-dir'    },
    'Server Manager':         { badge:'SM',   cls:'badge-mgmt',   av:'av-mgmt'   },
    'Head Administrator':     { badge:'HA',   cls:'badge-head',   av:'av-head'   },
    'Head Event Master':      { badge:'HEM',  cls:'badge-head',   av:'av-head'   },
    'Senior Administrator':   { badge:'SA',   cls:'badge-senior', av:'av-senior' },
    'Senior Event Master':    { badge:'SEM',  cls:'badge-senior', av:'av-senior' },
    'Administrator':          { badge:'ADM',  cls:'badge-staff',  av:'av-staff'  },
    'Event Master':           { badge:'EM',   cls:'badge-staff',  av:'av-staff'  },
    'Moderator':              { badge:'MOD',  cls:'badge-light',  av:'av-light'  },
    'Junior Event Master':    { badge:'JEM',  cls:'badge-light',  av:'av-light'  },
    'Trial Moderator':        { badge:'TM',   cls:'badge-tan',    av:'av-tan'    },
    'Trial Event Master':     { badge:'TEM',  cls:'badge-tan',    av:'av-tan'    },
    'Development Leadership': { badge:'DL',   cls:'badge-head',   av:'av-head'   },
    'Development Lead':       { badge:'DL',   cls:'badge-head',   av:'av-head'   },
    'Senior Developer':       { badge:'SD',   cls:'badge-senior', av:'av-senior' },
    'Senior Designer':        { badge:'SDS',  cls:'badge-senior', av:'av-senior' },
    'Developer':              { badge:'DEV',  cls:'badge-staff',  av:'av-staff'  },
    'Designer':               { badge:'GFX',  cls:'badge-staff',  av:'av-staff'  }
  };

  var RATING_CLS = {
    'Very Good':'cnr-vg','Good':'cnr-good','Average':'cnr-avg',
    'Below Average':'cnr-below','Needs Improvement':'cnr-below'
  };

  function parseCSV(text) {
    var rows=[],lines=text.split('\n');
    for(var i=0;i<lines.length;i++){
      var line=lines[i].trim();if(!line)continue;
      var cols=[],cur='',inQ=false;
      for(var c=0;c<line.length;c++){
        var ch=line[c];
        if(ch==='"'){inQ=!inQ;}
        else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
        else{cur+=ch;}
      }
      cols.push(cur.trim());rows.push(cols);
    }
    return rows;
  }

  function clean(s){ return (s||'').trim(); }

  // Normalize for comparison: collapse whitespace + lowercase
  function normalize(s){ return s.replace(/\s+/g,' ').trim().toLowerCase(); }

  function isTierRow(row){
    // Check columns 0, 1, 2 — whichever has a value
    var candidates = [clean(row[0]||''), clean(row[1]||''), clean(row[2]||'')];
    for(var ci=0; ci<candidates.length; ci++){
      var val = candidates[ci];
      if(!val) continue;
      var normVal = normalize(val);
      for(var i=0; i<TIER_LABELS.length; i++){
        if(normVal === normalize(TIER_LABELS[i])){
          return TIER_LABELS[i]; // return canonical label for TIER_META lookup
        }
      }
    }
    return null;
  }

  function ratingBadge(label,value){
    var v=clean(value);
    if(!v||v==='N / A'||v==='N/A'||v==='Bald'||v==='Balding'||v==='Ginger'||v==='Hair Intact?'||v.indexOf('Norwood')>-1)return'';
    var cls=RATING_CLS[v]||'cnr-avg';
    return'<span class="cnr-rating '+cls+'">'+label+': '+v+'</span>';
  }

  function buildCard(row, sectionKey){
    var name    =clean(row[2]);
    var rank    =clean(row[3]);
    var alias   =clean(row[5]);
    var role    =clean(row[6]);
    var discord =clean(row[7]);
    var perf    =clean(row[8]);
    var activity=clean(row[9]);

    if(!name||name==='N/A'||name==='N / A'||name==='---'||name==='Name')return'';

    var isVacant=(name.toUpperCase()==='VACANT');
    var rankKey=rank.trim();
    var meta=RANK_BADGE[rankKey]||{badge:rankKey.substring(0,3).toUpperCase(),cls:'badge-ops',av:'av-ops'};

    var initial=isVacant?'?':name.charAt(0).toUpperCase();
    var avCls=isVacant?'av-vacant':meta.av;
    var topCls=(meta.cls==='badge-exec')?'cnr-exec-top'
              :(meta.cls==='badge-dir')?'cnr-dir-top'
              :(meta.cls==='badge-mgmt')?'cnr-mgmt-top'
              :(meta.cls==='badge-head')?'cnr-head-top'
              :(meta.cls==='badge-senior')?'cnr-senior-top'
              :(meta.cls==='badge-light'||meta.cls==='badge-tan')?'cnr-light-top'
              :(meta.cls==='badge-dev'||meta.cls==='badge-gfx')?'cnr-dev-top'
              :'cnr-ops-top';

    var pr=ratingBadge('Perf',perf);
    var ar=ratingBadge('Activity',activity);
    var ratings=(pr||ar)&&!isVacant?'<div class="cnr-ratings">'+pr+ar+'</div>':'';

    var discordHtml=(discord&&discord!=='VACANT'&&discord!=='N/A'&&discord!=='N / A')
      ?'<div class="cnr-meta"><span class="cnr-discord">'+discord+'</span></div>':'';
    var aliasHtml=(alias&&alias!=='VACANT'&&alias!=='N/A'&&alias!=='N / A')
      ?'<p class="cnr-alias">'+alias+'</p>':'';
    var roleHtml=role?'<p class="cnr-role">'+role+'</p>':'';

    var dataAttrs = isVacant ? '' :
      ' data-name="'+name.replace(/"/g,'&quot;')+'"'+
      ' data-rank="'+rank.replace(/"/g,'&quot;')+'"'+
      ' data-alias="'+(alias||'').replace(/"/g,'&quot;')+'"'+
      ' data-role="'+(role||'').replace(/"/g,'&quot;')+'"'+
      ' data-discord="'+(discord||'').replace(/"/g,'&quot;')+'"'+
      ' data-perf="'+(perf||'').replace(/"/g,'&quot;')+'"'+
      ' data-activity="'+(activity||'').replace(/"/g,'&quot;')+'"'+
      ' data-badgecls="'+meta.cls+'"'+
      ' data-avcls="'+avCls+'"'+
      ' data-badgetxt="'+meta.badge+'"'+
      ' data-section="'+(sectionKey||'').replace(/"/g,'&quot;')+'"';
    var clickAttr = isVacant ? '' : ' onclick="cnrOpenModal(this)" style="cursor:pointer;"';
    return'<div class="cnr-card'+(isVacant?' cnr-vacant':'')+'"'+dataAttrs+clickAttr+'><div class="cnr-card-top '+topCls+'"><span class="cnr-rank-badge cnr-'+meta.cls+'">'+meta.badge+'</span><div class="cnr-avatar cnr-'+avCls+'">'+initial+'</div></div><div class="cnr-card-body"><h3>'+name+'</h3><p class="cnr-rank-label">'+rank+'</p>'+roleHtml+aliasHtml+ratings+discordHtml+'</div></div>';
  }

  function buildSection(rows, sectionKey){
    var html='',gridCards='';
    var skipValues=['Celestial Networks | Server Operations Branch','Celestial Networks | Development Branch','Name',''];

    function flushGrid(){
      if(gridCards){html+='<div class="cnr-grid">'+gridCards+'</div>';gridCards='';}
    }

    for(var i=0;i<rows.length;i++){
      var row=rows[i];
      var tier=isTierRow(row);
      if(tier){
        flushGrid();
        var tm=TIER_META[tier]||{label:tier,pip:'ops'};
        html+='<div class="cnr-tier-header"><div class="cnr-th-pip cnr-pip-'+tm.pip+'"></div><div><h2>'+tm.label+'</h2></div></div>';
        continue;
      }
      var name=clean(row[2]);
      var skip=false;
      for(var s=0;s<skipValues.length;s++){if(name===skipValues[s]){skip=true;break;}}
      if(skip)continue;
      var card=buildCard(row, sectionKey||'');
      if(card)gridCards+=card;
    }
    flushGrid();
    return html;
  }

  function fetchSheet(key,callback){
    var xhr=new XMLHttpRequest();
    xhr.open('GET',SHEETS[key],true);
    xhr.onload=function(){
      if(xhr.status===200)callback(null,parseCSV(xhr.responseText));
      else callback('HTTP '+xhr.status);
    };
    xhr.onerror=function(){callback('Network error');};
    xhr.send();
  }

  function renderSheet(key,rows){
    var loading=document.getElementById('cnr-'+key+'-loading');
    var content=document.getElementById('cnr-'+key+'-content');
    if(loading)loading.style.display='none';
    if(content)content.innerHTML=buildSection(rows, key);
  }

  function init(){
    var keys=['cw','imp','dev'],done=0;
    keys.forEach(function(key){
      fetchSheet(key,function(err,rows){
        done++;
        if(err){
          var el=document.getElementById('cnr-'+key+'-loading');
          if(el)el.innerHTML='<p style="color:#f77e7e;">Failed to load roster. Please refresh.</p>';
        }else{
          renderSheet(key,rows);
        }
        if(done===keys.length){
          var now=new Date();
          var el=document.getElementById('cnr-updated');
          if(el)el.textContent='Last updated: '+now.toLocaleDateString([],{day:'numeric',month:'short',year:'numeric'})+' at '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        }
      });
    });
  }

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
  else init();
})();

function cnrShow(id,btn){
  document.querySelectorAll('.cnr-section').forEach(function(s){s.classList.remove('cnr-active');});
  document.querySelectorAll('.cnr-btn').forEach(function(b){b.classList.remove('cnr-active');});
  document.getElementById('cnr-'+id).classList.add('cnr-active');
  btn.classList.add('cnr-active');
}
</script>

<script>
// ── Modal logic ──
var RATING_CLS_MODAL = {
  'Very Good':'cnr-vg','Good':'cnr-good','Average':'cnr-avg',
  'Below Average':'cnr-below','Needs Improvement':'cnr-below'
};

// Map badge cls → modal accent colour
var MODAL_COLORS = {
  'badge-exec':   'rgba(100,30,180,0.18)',
  'badge-dir':    'rgba(230,120,30,0.16)',
  'badge-mgmt':   'rgba(100,15,30,0.22)',
  'badge-head':   'rgba(180,60,20,0.18)',
  'badge-senior': 'rgba(200,170,20,0.16)',
  'badge-staff':  'rgba(41,98,185,0.16)',
  'badge-ops':    'rgba(41,98,185,0.14)',
  'badge-light':  'rgba(100,160,230,0.14)',
  'badge-tan':    'rgba(160,130,80,0.14)',
  'badge-dev':    'rgba(180,60,20,0.16)',
  'badge-gfx':    'rgba(41,98,185,0.14)'
};

// Map rank to division description shown in modal
var RANK_DIVISION = {
  'Network Executive':      'CN Executive Team',
  'Network Director':       'CN Executive Team',
  'Server Manager':         'Server Operations',
  'Head Administrator':     'Server Operations',
  'Head Event Master':      'Server Operations',
  'Senior Administrator':   'Server Operations',
  'Senior Event Master':    'Event Management',
  'Administrator':          'Server Operations',
  'Event Master':           'Event Management',
  'Moderator':              'Server Operations',
  'Junior Event Master':    'Event Management',
  'Trial Moderator':        'Server Operations',
  'Trial Event Master':     'Event Management',
  'Development Leadership': 'Development Branch',
  'Development Lead':       'Development Branch',
  'Senior Developer':       'Development Branch',
  'Senior Designer':        'Design & Marketing',
  'Developer':              'Development Branch',
  'Designer':               'Design & Marketing'
};

// ── Step 1: click stores card, asks parent for scroll position ──
function cnrOpenModal(card) {
  window._cnrPendingCard = card;
  clearTimeout(window._cnrScrollTimeout);
  try { window.parent.postMessage({ type: 'cnr-request-scroll' }, '*'); } catch(e) {}
  // Fallback: if parent doesn't reply within 80ms, open using iframe's own scroll
  window._cnrScrollTimeout = setTimeout(function() {
    if (window._cnrPendingCard) {
      cnrBuildModal(window._cnrPendingCard, window.scrollY || 0, window.innerHeight || 900);
      window._cnrPendingCard = null;
    }
  }, 80);
}

// ── Step 2: receive scroll reply from parent page ──
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'cnr-scroll-reply') {
    clearTimeout(window._cnrScrollTimeout);
    if (window._cnrPendingCard) {
      cnrBuildModal(window._cnrPendingCard, e.data.scrollY, e.data.viewportHeight);
      window._cnrPendingCard = null;
    }
  }
});

// ── Step 3: build and position the modal ──
function cnrBuildModal(card, parentScrollY, viewportHeight) {
  var d = card.dataset;
  var name     = d.name     || '—';
  var rank     = d.rank     || '';
  var alias    = d.alias    || '';
  var role     = d.role     || '';
  var discord  = d.discord  || '';
  var perf     = d.perf     || '';
  var activity = d.activity || '';
  var badgeCls = d.badgecls || 'badge-ops';
  var avCls    = d.avcls    || 'av-ops';
  var badgeTxt = d.badgetxt || '';
  var section  = d.section  || '';

  // ── Staff Branch ──
  var branch, branchCls;
  if (badgeCls === 'badge-exec' || badgeCls === 'badge-dir') {
    branch = 'Executive Staff'; branchCls = 'cnr-w-exec';
  } else if (section === 'dev') {
    branch = 'Development';     branchCls = 'cnr-w-dev';
  } else {
    branch = 'Server Operations'; branchCls = 'cnr-w-ops';
  }

  // ── Game Server (Server Operations only) ──
  var serverWidget = '';
  if (branch === 'Server Operations' && section !== 'dev') {
    var serverLabel = section === 'cw' ? 'Clone Wars RP' : section === 'imp' ? 'Imperial RP' : '—';
    var serverCls   = section === 'cw' ? 'cnr-w-cw' : 'cnr-w-imp';
    serverWidget = buildWidget(serverCls,
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
      'Game Server', serverLabel);
  }

  // ── Access Level ──
  var ACCESS = {
    'badge-exec':   { level:'Full Access',  cls:'cnr-w-acc-a', desc:'Network-wide' },
    'badge-dir':    { level:'Full Access',  cls:'cnr-w-acc-a', desc:'Network-wide' },
    'badge-mgmt':   { level:'Elevated',     cls:'cnr-w-acc-b', desc:'Server-level'  },
    'badge-head':   { level:'Elevated',     cls:'cnr-w-acc-b', desc:'Server-level'  },
    'badge-senior': { level:'Standard+',    cls:'cnr-w-acc-c', desc:'Senior systems' },
    'badge-staff':  { level:'Standard',     cls:'cnr-w-acc-c', desc:'Staff systems'  },
    'badge-ops':    { level:'Standard',     cls:'cnr-w-acc-c', desc:'Staff systems'  },
    'badge-dev':    { level:'Standard',     cls:'cnr-w-acc-c', desc:'Dev systems'    },
    'badge-gfx':    { level:'Standard',     cls:'cnr-w-acc-c', desc:'Dev systems'    },
    'badge-light':  { level:'Limited',      cls:'cnr-w-acc-d', desc:'Basic access'   },
    'badge-tan':    { level:'Limited',      cls:'cnr-w-acc-d', desc:'Trial access'   },
  };
  var acc = ACCESS[badgeCls] || { level:'Limited', cls:'cnr-w-acc-d', desc:'Basic access' };

  // ── Banner gradient per rank tier ──
  var BANNERS = {
    'badge-exec':   'linear-gradient(140deg, rgba(100,20,220,0.75) 0%, rgba(30,8,70,0.95) 100%)',
    'badge-dir':    'linear-gradient(140deg, rgba(210,95,15,0.72) 0%, rgba(55,18,5,0.95) 100%)',
    'badge-mgmt':   'linear-gradient(140deg, rgba(140,15,25,0.78) 0%, rgba(40,5,10,0.95) 100%)',
    'badge-head':   'linear-gradient(140deg, rgba(185,60,15,0.72) 0%, rgba(50,14,4,0.95) 100%)',
    'badge-senior': 'linear-gradient(140deg, rgba(180,148,10,0.62) 0%, rgba(50,38,4,0.95) 100%)',
    'badge-staff':  'linear-gradient(140deg, rgba(28,78,178,0.58) 0%, rgba(7,16,55,0.95) 100%)',
    'badge-ops':    'linear-gradient(140deg, rgba(28,78,178,0.58) 0%, rgba(7,16,55,0.95) 100%)',
    'badge-light':  'linear-gradient(140deg, rgba(55,120,215,0.5) 0%, rgba(8,22,68,0.95) 100%)',
    'badge-tan':    'linear-gradient(140deg, rgba(145,105,38,0.52) 0%, rgba(35,22,7,0.95) 100%)',
    'badge-dev':    'linear-gradient(140deg, rgba(175,58,14,0.68) 0%, rgba(42,12,4,0.95) 100%)',
    'badge-gfx':    'linear-gradient(140deg, rgba(28,78,178,0.55) 0%, rgba(7,16,55,0.95) 100%)',
  };
  var bannerGrad = BANNERS[badgeCls] || 'linear-gradient(140deg, rgba(25,25,55,0.8) 0%, rgba(8,8,22,0.97) 100%)';

  // ── Perf pill helper ──
  function perfBadge(val) {
    if (!val || val === 'N/A' || val === 'N / A' || val.indexOf('Norwood') > -1 ||
        val === 'Bald' || val === 'Balding' || val === 'Ginger' || val === 'Hair Intact?') return null;
    var cls = val === 'Very Good' ? 'cnr-pb-vg'
            : val === 'Good' ? 'cnr-pb-good'
            : (val === 'Below Average' || val === 'Needs Improvement') ? 'cnr-pb-below'
            : 'cnr-pb-avg';
    return '<span class="cnr-pb ' + cls + '">' + val + '</span>';
  }

  // ── Render banner ──
  document.getElementById('cnr-pc-banner-bg').style.background = bannerGrad;

  var av = document.getElementById('cnr-pc-avatar');
  av.className = 'cnr-pc-avatar cnr-' + avCls;
  av.textContent = name.charAt(0).toUpperCase();

  document.getElementById('cnr-pc-name').textContent = name;
  document.getElementById('cnr-pc-rank-line').innerHTML =
    '<span class="cnr-pc-rankname">' + (rank || 'Staff Member') + '</span>' +
    '&ensp;<span class="cnr-rank-badge cnr-' + badgeCls + '">' + badgeTxt + '</span>';

  // ── Widget grid: always 3 cols (branch, access, server if applicable) ──
  var branchW = buildWidget(branchCls,
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
    'Staff Branch', branch);
  var accessW = buildWidget(acc.cls,
    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
    'System Access', acc.level);

  var widgetContainer = document.getElementById('cnr-pc-widgets');
  if (serverWidget) {
    widgetContainer.className = 'cnr-pc-widgets'; // 3 col
    widgetContainer.innerHTML = branchW + serverWidget + accessW;
  } else {
    widgetContainer.className = 'cnr-pc-widgets cnr-w2'; // 2 col
    widgetContainer.innerHTML = branchW + accessW;
  }

  // ── Body details ──
  var body = '';

  // Details section
  body += '<div class="cnr-pc-section-label">Details</div>';
  if (role && role !== 'N/A' && role !== 'N / A') {
    body += row('🏷', 'Role', role, false);
  }
  if (alias && alias !== 'N/A' && alias !== 'N / A') {
    body += row('💬', 'Known As', alias, true);
  }
  body += row('🏛', 'Division', RANK_DIVISION[rank] || 'Celestial Networks', false);
  // Access description as a detail row with a coloured badge
  body += rowHtml('🔑', 'Access',
    '<span class="cnr-access-badge ' + acc.cls + '">' + acc.level + ' — ' + acc.desc + '</span>');

  // Performance section (only if data exists)
  var pb = perfBadge(perf), ab = perfBadge(activity);
  if (pb || ab) {
    body += '<div class="cnr-pc-section-label">Performance</div>';
    if (pb) body += rowHtml('⭐', 'Performance', pb);
    if (ab) body += rowHtml('🕐', 'Activity', ab);
  }

  document.getElementById('cnr-pc-body').innerHTML = body;

  // ── Footer ──
  var footer = '';
  if (discord && discord !== 'VACANT' && discord !== 'N/A' && discord !== 'N / A') {
    footer += '<span class="cnr-pc-discord-pill">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.01.098.058.189.141.246A19.959 19.959 0 0 0 6.1 20.53a.077.077 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>' +
      discord + '</span>';
  } else {
    footer += '<span class="cnr-pc-no-discord">No Discord on file</span>';
  }
  footer += '<a href="https://celestialnetworks.au/staff/" target="_blank" rel="noopener" class="cnr-pc-forum-btn">' +
    '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
    'Staff Page</a>';
  document.getElementById('cnr-pc-footer').innerHTML = footer;

  // ── Position overlay over visible viewport ──
  var vh   = Math.max(viewportHeight || 0, window.innerHeight || 0, 600);
  var docH = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
  var top  = Math.max(0, Math.min(parentScrollY, docH - vh));
  var overlay = document.getElementById('cnr-overlay');
  overlay.style.top    = top + 'px';
  overlay.style.height = vh + 'px';
  overlay.classList.add('cnr-open');
  try { window.parent.postMessage({ type: 'cnr-lock-scroll', lock: true }, '*'); } catch(e) {}
}

function buildWidget(cls, iconSvg, label, val) {
  return '<div class="cnr-pc-widget ' + cls + '">' +
    '<div class="cnr-pc-widget-icon">' + iconSvg + '</div>' +
    '<div class="cnr-pc-widget-text">' +
      '<div class="cnr-pc-widget-label">' + label + '</div>' +
      '<div class="cnr-pc-widget-val">' + val + '</div>' +
    '</div></div>';
}
function row(icon, label, val, italic) {
  return '<div class="cnr-pc-row">' +
    '<div class="cnr-pc-row-icon">' + icon + '</div>' +
    '<div class="cnr-pc-row-label">' + label + '</div>' +
    '<div class="cnr-pc-row-val' + (italic ? ' italic' : '') + '">' + val + '</div>' +
    '</div>';
}
function rowHtml(icon, label, valHtml) {
  return '<div class="cnr-pc-row">' +
    '<div class="cnr-pc-row-icon">' + icon + '</div>' +
    '<div class="cnr-pc-row-label">' + label + '</div>' +
    '<div class="cnr-pc-row-val">' + valHtml + '</div>' +
    '</div>';
}

function cnrCloseModal() {
  document.getElementById('cnr-overlay').classList.remove('cnr-open');
  try { window.parent.postMessage({ type: 'cnr-lock-scroll', lock: false }, '*'); } catch(e) {}
}

function cnrModalClose(e) {
  if (e.target === document.getElementById('cnr-overlay')) cnrCloseModal();
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') cnrCloseModal();
});
</script>

</html>
